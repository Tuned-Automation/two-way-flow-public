<?xml version="1.0" encoding="UTF-8"?>
<!--
  Two Way Flow - app icon
  ============================================================================
  Composition:
    * Soft off-white squircle backdrop (1024x1024, rx/ry=180) with a subtle
      top-to-bottom gradient (#FFFFFF -> #E2E8F0) so the mark has lift on
      both light and dark desktops (Slack / Linear / Notion convention).
    * The REAL brand mark - the single complex path from
      /Users/taylor/OLC CRM/2-Way-Flow/icons/logo_icon.svg (237x237 source
      viewBox, single <path> with fill-rule:evenodd carving the flow cutouts).
      Scaled 3.5x and centred so it occupies ~81% of the canvas.
    * Mark fill is the "Electric" linear gradient (indigo -> violet -> deep
      indigo-black) diagonally top-left to bottom-right.
    * Soft drop shadow under the mark (~12% opacity) for subtle dimension.

  To re-theme: tweak the <stop> elements inside #brandGradient or #backdrop.
  DO NOT redraw the brand path - it's authored upstream in
  icons/logo_icon.svg. To resync, copy the <path d="..."> verbatim from
  there into the brand-mark <path> below.
  ============================================================================
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1024 1024"
  width="1024"
  height="1024"
>
  <defs>
    <!-- Backdrop: subtle top-down white-to-cool-grey gradient, gives the
         squircle a soft "lit from above" feel without competing with the
         brand mark. -->
    <linearGradient id="backdrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Brand mark gradient: Electric indigo / violet / deep indigo-black,
         diagonal sweep (top-left bright, bottom-right dark). Same palette
         the previous icon used; only the geometry changed. -->
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5B6CFF"/>
      <stop offset="50%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>

    <!-- Soft drop shadow under the brand mark to give it lift on the
         backdrop. Black at ~12% opacity, gentle blur, small downward
         offset. -->
    <filter id="markShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.12"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Off-white squircle backdrop. rx/ry=180 gives a macOS-style rounded
       square (~17.6% of side length). -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="url(#backdrop)"/>

  <!-- Brand mark group: scale the 237x237 source path 3.5x and centre on
       the 1024 canvas. translate = (1024 - 237*3.5) / 2 = 97.25. Mark
       therefore occupies ~81% of the canvas (829.5 / 1024). -->
  <g transform="translate(97.25, 97.25) scale(3.5)" filter="url(#markShadow)">
    <!-- The brand mark path. Copied byte-for-byte from
         icons/logo_icon.svg. DO NOT EDIT geometry here - resync from
         the upstream source if the brand evolves. -->
    <path
      fill="url(#brandGradient)"
      fill-rule="evenodd"
      clip-rule="evenodd"
      d="M101.571,0.421C84.368,3.614 70.712,8.302 59.634,14.817C27.889,33.484 7.577,62.734 1.29,98.833C-1.028,112.119 -0.132,134.187 3.249,147.135C11.639,179.286 30.238,203.604 60.243,221.64L63.811,223.786L69.009,209.729C73.217,198.307 77.394,186.88 81.535,175.442C95.41,137.13 99.764,125.604 101.181,123.39C103.191,120.255 107.394,120.526 111.863,124.078C117.009,128.166 121.472,129.489 125.566,128.135C129.009,127 138.155,118.218 147.316,107.255C152.493,101.052 153.009,100.708 157.999,100.109C164.65,99.312 179.249,99.447 182.483,100.338C184.181,100.807 185.04,101.822 185.249,103.593C185.483,105.588 183.853,108.192 178.019,115.145C172.103,122.203 120.879,178.265 118.426,180.375C118.108,180.645 115.207,183.755 111.983,187.281C108.754,190.807 102.092,197.927 97.181,203.098C91.738,208.833 86.306,214.578 80.884,220.333L73.519,228.161L82.176,230.916C108.92,239.437 136.764,238.364 163.321,227.781C191.624,216.505 216.045,192.234 227.889,163.598C235.821,144.432 238.749,118.994 235.342,98.916C230.707,71.619 216.696,46.281 196.775,29.161C187.853,21.5 171.379,10.656 168.66,10.656C167.082,10.656 154.952,41.651 135.045,96.505C126.853,119.088 124.884,120.656 114.019,113.276C109.551,110.244 107.264,109.328 104.124,109.328C99.311,109.328 97.332,110.541 88.67,118.786C81.097,126 79.634,126.437 64.686,125.947C55.577,125.651 53.988,125.343 52.129,123.479C50.571,121.921 50.17,120.671 50.634,118.828C51.025,117.27 71.999,95.619 105.525,62.161C135.368,32.385 159.785,7.786 159.785,7.5C159.785,6.687 152.103,4.015 144.493,2.177C137.775,0.552 107.525,-0.683 101.571,0.421"
    />
  </g>
</svg>
